name = "text-share"
main = "src/index.ts"
compatibility_date = "2026-07-03"
workers_dev = true
preview_urls = false

[[d1_databases]]
binding = "DB"
database_name = "text-share"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "text-share-files"

[triggers]
crons = ["0 0 * * *"]
